<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结束页</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .slide {
            width: 1280px;
            height: 720px;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        
        /* 发光圆环装饰 */
        .glow-ring {
            position: absolute;
            width: 500px;
            height: 500px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 50%;
            box-shadow: 
                0 0 60px rgba(0, 212, 255, 0.1),
                inset 0 0 60px rgba(0, 212, 255, 0.05);
        }
        
        .glow-ring-2 {
            position: absolute;
            width: 650px;
            height: 650px;
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 50%;
        }
        
        /* Android 机器人 */
        .android-robot {
            position: absolute;
            right: 100px;
            top: 50%;
            transform: translateY(-50%);
            width: 150px;
            height: 180px;
            opacity: 0.3;
        }
        
        .robot-head {
            width: 80px;
            height: 40px;
            background: linear-gradient(180deg, #3ddc84 0%, #2cb86a 100%);
            border-radius: 40px 40px 0 0;
            margin: 0 auto;
            position: relative;
        }
        
        .robot-antenna {
            position: absolute;
            width: 3px;
            height: 15px;
            background: #3ddc84;
            top: -14px;
        }
        
        .robot-antenna.left { left: 20px; transform: rotate(-20deg); }
        .robot-antenna.right { right: 20px; transform: rotate(20deg); }
        
        .robot-eye {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #0d0d1a;
            border-radius: 50%;
            top: 16px;
        }
        
        .robot-eye.left { left: 20px; }
        .robot-eye.right { right: 20px; }
        
        .robot-body {
            width: 80px;
            height: 70px;
            background: linear-gradient(180deg, #3ddc84 0%, #2cb86a 100%);
            border-radius: 0 0 16px 16px;
            margin: 4px auto 0;
            position: relative;
        }
        
        .robot-arm {
            position: absolute;
            width: 20px;
            height: 55px;
            background: linear-gradient(180deg, #3ddc84 0%, #2cb86a 100%);
            border-radius: 16px;
            top: 4px;
        }
        
        .robot-arm.left { left: -24px; }
        .robot-arm.right { right: -24px; }
        
        .robot-leg {
            position: absolute;
            width: 20px;
            height: 40px;
            background: linear-gradient(180deg, #3ddc84 0%, #2cb86a 100%);
            border-radius: 0 0 16px 16px;
            bottom: -36px;
        }
        
        .robot-leg.left { left: 12px; }
        .robot-leg.right { right: 12px; }
        
        .content {
            text-align: center;
            z-index: 10;
        }
        
        .main-title {
            font-size: 80px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 
                0 0 20px rgba(0, 212, 255, 0.5),
                0 0 40px rgba(0, 212, 255, 0.3);
            letter-spacing: 6px;
            margin-bottom: 20px;
            background: linear-gradient(180deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 32px;
            color: #00d4ff;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .ending-text {
            font-size: 28px;
            color: #00ff88;
            font-weight: 500;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            padding: 20px 50px;
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 50px;
            background: rgba(0, 255, 136, 0.05);
        }
        
        /* 底部装饰线 */
        .bottom-line {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
        }
        
        /* 角落装饰 */
        .corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }
        
        .corner.top-left {
            top: 40px;
            left: 40px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner.top-right {
            top: 40px;
            right: 40px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner.bottom-left {
            bottom: 40px;
            left: 40px;
            border-right: none;
            border-top: none;
        }
        
        .corner.bottom-right {
            bottom: 40px;
            right: 40px;
            border-left: none;
            border-top: none;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="grid-bg"></div>
        <div class="glow-ring"></div>
        <div class="glow-ring-2"></div>
        
        <!-- Android 机器人 -->
        <div class="android-robot">
            <div class="robot-head">
                <div class="robot-antenna left"></div>
                <div class="robot-antenna right"></div>
                <div class="robot-eye left"></div>
                <div class="robot-eye right"></div>
            </div>
            <div class="robot-body">
                <div class="robot-arm left"></div>
                <div class="robot-arm right"></div>
                <div class="robot-leg left"></div>
                <div class="robot-leg right"></div>
            </div>
        </div>
        
        <!-- 主内容 -->
        <div class="content">
            <h1 class="main-title">Android 架构 15 年</h1>
            <p class="subtitle">从代码堆砌到规范化设计</p>
            <div class="ending-text">理解演进，选择适合的架构</div>
        </div>
        
        <!-- 装饰元素 -->
        <div class="bottom-line"></div>
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
    </div>
</body>
</html>
