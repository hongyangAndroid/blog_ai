<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核心启示</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .slide {
            width: 1280px;
            height: 720px;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 60px 80px;
        }
        
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        
        .title {
            font-size: 56px;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            margin-bottom: 80px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        
        .insights-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            flex: 1;
        }
        
        .insight-card {
            display: flex;
            align-items: center;
            padding: 35px 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .insight-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .insight-card:nth-child(1) { border-color: rgba(0, 212, 255, 0.3); }
        .insight-card:nth-child(2) { border-color: rgba(0, 255, 136, 0.3); }
        .insight-card:nth-child(3) { border-color: rgba(255, 170, 0, 0.3); }
        .insight-card:nth-child(4) { border-color: rgba(236, 72, 153, 0.3); }
        
        .insight-icon {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            margin-right: 30px;
            flex-shrink: 0;
        }
        
        .insight-card:nth-child(1) .insight-icon { 
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.3);
        }
        .insight-card:nth-child(2) .insight-icon { 
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.3);
        }
        .insight-card:nth-child(3) .insight-icon { 
            background: linear-gradient(135deg, #ffaa00, #cc8800);
            box-shadow: 0 15px 40px rgba(255, 170, 0, 0.3);
        }
        .insight-card:nth-child(4) .insight-icon { 
            background: linear-gradient(135deg, #ec4899, #be185d);
            box-shadow: 0 15px 40px rgba(236, 72, 153, 0.3);
        }
        
        .insight-text h3 {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .insight-text p {
            color: #aaa;
            font-size: 16px;
            line-height: 1.6;
        }
        
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }
        
        .corner.top-left { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .corner.top-right { top: 30px; right: 30px; border-left: none; border-bottom: none; }
        .corner.bottom-left { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .corner.bottom-right { bottom: 30px; right: 30px; border-left: none; border-top: none; }
    </style>
</head>
<body>
    <div class="slide">
        <div class="grid-bg"></div>
        
        <h1 class="title">架构演进的核心启示</h1>
        
        <div class="insights-container">
            <div class="insight-card">
                <div class="insight-icon">🎯</div>
                <div class="insight-text">
                    <h3>始终围绕核心目标</h3>
                    <p>解耦、可维护、可测试 —— 15年演进始终围绕这三大核心目标</p>
                </div>
            </div>
            
            <div class="insight-card">
                <div class="insight-icon">📈</div>
                <div class="insight-text">
                    <h3>每个阶段都是最优解</h3>
                    <p>没有绝对的好坏，每个架构都是特定历史背景下的最佳选择</p>
                </div>
            </div>
            
            <div class="insight-card">
                <div class="insight-icon">💡</div>
                <div class="insight-text">
                    <h3>没有银弹，理解脉络</h3>
                    <p>理解演进脉络，才能在面对新项目时做出正确选择</p>
                </div>
            </div>
            
            <div class="insight-card">
                <div class="insight-icon">🚀</div>
                <div class="insight-text">
                    <h3>复杂度管理是永恒主题</h3>
                    <p>架构的本质是对复杂度的管理，这是开发者永恒的挑战</p>
                </div>
            </div>
        </div>
        
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
    </div>
</body>
</html>
