<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>为什么你必须学Skill？</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1440px;
      margin: 0;
      overflow: hidden;
      background: #faf9f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      position: relative;
    }
    
    .grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    .container {
      position: relative;
      z-index: 10;
      height: 100%;
      padding: 100px 80px;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      text-align: center;
      margin-bottom: 80px;
    }
    
    .title {
      font-size: 56px;
      font-weight: 700;
      color: #2c2c2c;
      letter-spacing: -1px;
    }
    
    .value-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      flex: 1;
    }
    
    .value-card {
      background: white;
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    
    .value-icon {
      font-size: 56px;
      margin-bottom: 24px;
    }
    
    .value-label {
      font-size: 32px;
      font-weight: 700;
      color: #2c2c2c;
      margin-bottom: 16px;
    }
    
    .value-desc {
      font-size: 24px;
      color: #666;
      line-height: 1.5;
    }
    
    .cta-section {
      margin-top: 60px;
      text-align: center;
    }
    
    .cta-button {
      display: inline-block;
      background: #2c2c2c;
      color: white;
      font-size: 32px;
      font-weight: 600;
      padding: 24px 60px;
      border-radius: 50px;
      text-decoration: none;
      margin-bottom: 40px;
    }
    
    .hashtags {
      font-size: 22px;
      color: #999;
      letter-spacing: 2px;
    }
    
    .deco-quote {
      position: absolute;
      top: 60px;
      right: 60px;
      font-size: 120px;
      color: rgba(0,0,0,0.05);
      font-family: Georgia, serif;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="deco-quote">"</div>
  
  <div class="container">
    <div class="header">
      <h1 class="title">为什么你必须学 Skill？</h1>
    </div>
    
    <div class="value-grid">
      <div class="value-card">
        <div class="value-icon">🎯</div>
        <div class="value-label">零门槛</div>
        <div class="value-desc">不用写代码<br>AI自动完成</div>
      </div>
      
      <div class="value-card">
        <div class="value-icon">📦</div>
        <div class="value-label">可复制</div>
        <div class="value-desc">收藏改造别人的skill<br>"拿来吧你"</div>
      </div>
      
      <div class="value-card">
        <div class="value-icon">⚡</div>
        <div class="value-label">高效率</div>
        <div class="value-desc">让AI 24小时待命<br>做你要的事</div>
      </div>
      
      <div class="value-card">
        <div class="value-icon">🚀</div>
        <div class="value-label">快速追赶</div>
        <div class="value-desc">瞬间缩小<br>与AI圈差距</div>
      </div>
    </div>
    
    <div class="cta-section">
      <div class="cta-button">现在开始你的Skill之旅 →</div>
      <div class="hashtags">#AI入门 #Skill #效率工具 #知识分享</div>
    </div>
  </div>
</body>
</html>
