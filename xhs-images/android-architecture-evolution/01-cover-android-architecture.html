<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android架构15年演进 - 封面</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f7f6f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .xhs-card {
            width: 900px;
            height: 1200px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 60px;
            position: relative;
            overflow: hidden;
        }
        
        /* Grid Background */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        
        /* Content */
        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        /* Fire Icon */
        .fire-icon {
            position: absolute;
            top: 40px;
            right: 50px;
            font-size: 48px;
            animation: flicker 2s ease-in-out infinite;
        }
        
        @keyframes flicker {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Title Section */
        .title-section {
            margin-top: 120px;
            text-align: center;
        }
        
        .main-title {
            font-size: 72px;
            font-weight: 900;
            color: #2c2c2c;
            letter-spacing: -2px;
            line-height: 1.2;
            margin-bottom: 20px;
        }
        
        .highlight {
            color: #e16259;
            position: relative;
        }
        
        .highlight::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 0;
            right: 0;
            height: 12px;
            background: rgba(225, 98, 89, 0.2);
            border-radius: 4px;
            z-index: -1;
        }
        
        .subtitle {
            font-size: 32px;
            color: #6b6b6b;
            font-weight: 400;
            margin-top: 30px;
        }
        
        /* Timeline Section */
        .timeline-section {
            margin-top: auto;
            margin-bottom: 80px;
            padding: 0 20px;
        }
        
        .timeline-label {
            text-align: center;
            font-size: 18px;
            color: #9b9b9b;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .timeline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            padding: 0 20px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 40px;
            right: 40px;
            height: 3px;
            background: linear-gradient(90deg, #e16259 0%, #f5a623 50%, #4dabf7 100%);
            border-radius: 2px;
            transform: translateY(-50%);
        }
        
        .timeline-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        
        .node-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            border: 4px solid #e16259;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(225, 98, 89, 0.3);
        }
        
        .timeline-node:nth-child(2) .node-dot { border-color: #f5a623; }
        .timeline-node:nth-child(3) .node-dot { border-color: #fab005; }
        .timeline-node:nth-child(4) .node-dot { border-color: #40c057; }
        .timeline-node:nth-child(5) .node-dot { border-color: #228be6; }
        .timeline-node:nth-child(6) .node-dot { border-color: #7950f2; }
        .timeline-node:nth-child(7) .node-dot { border-color: #be4bdb; }
        
        .node-year {
            font-size: 16px;
            color: #6b6b6b;
            font-weight: 500;
        }
        
        /* Tech Icons */
        .tech-icons {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            margin-top: 20px;
        }
        
        .tech-icon {
            font-size: 28px;
            opacity: 0.6;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            font-size: 20px;
            color: #9b9b9b;
            margin-top: 30px;
        }
        
        .footer span {
            color: #e16259;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="xhs-card">
        <div class="grid-bg"></div>
        
        <div class="content">
            <div class="fire-icon">🔥</div>
            
            <div class="title-section">
                <h1 class="main-title">
                    Android架构<br>
                    <span class="highlight">15年演进</span>
                </h1>
                <p class="subtitle">一张图看懂7个阶段</p>
            </div>
            
            <div class="timeline-section">
                <p class="timeline-label">Evolution Timeline</p>
                
                <div class="tech-icons">
                    <span class="tech-icon">📱</span>
                    <span class="tech-icon">⚡</span>
                    <span class="tech-icon">🏗️</span>
                    <span class="tech-icon">🔄</span>
                    <span class="tech-icon">📊</span>
                    <span class="tech-icon">🌊</span>
                    <span class="tech-icon">🚀</span>
                </div>
                
                <div class="timeline">
                    <div class="timeline-node">
                        <div class="node-dot"></div>
                        <span class="node-year">2010</span>
                    </div>
                    <div class="timeline-node">
                        <div class="node-dot"></div>
                        <span class="node-year">2013</span>
                    </div>
                    <div class="timeline-node">
                        <div class="node-dot"></div>
                        <span class="node-year">2014</span>
                    </div>
                    <div class="timeline-node">
                        <div class="node-dot"></div>
                        <span class="node-year">2016</span>
                    </div>
                    <div class="timeline-node">
                        <div class="node-dot"></div>
                        <span class="node-year">2017</span>
                    </div>
                    <div class="timeline-node">
                        <div class="node-dot"></div>
                        <span class="node-year">2019</span>
                    </div>
                    <div class="timeline-node">
                        <div class="node-dot"></div>
                        <span class="node-year">2020</span>
                    </div>
                </div>
                
                <div class="footer">
                    从代码堆砌到<span>架构大师</span>的进化之路
                </div>
            </div>
        </div>
    </div>
</body>
</html>
